<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/template :: layout (~{::body}, 'home', ~{::#dynamicCss}, ~{::#dynamicJS})}">
<body>
<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="page-title-box d-sm-flex align-items-center justify-content-between">
        <h4 class="mb-sm-0 font-size-18">Websites</h4>
        <div class="page-title-right">
          <ol class="breadcrumb m-0">
            <li class="breadcrumb-item"><a href="javascript: void(0);">Websites</a></li>
            <li class="breadcrumb-item active">Danh sách website</li>
          </ol>
        </div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-lg-12">
      <div class="card">
        <div class="card-body border-bottom">
          <div class="d-flex align-items-center">
            <h5 class="mb-0 card-title flex-grow-1">VPS Lists</h5>
            <div class="flex-shrink-0">
              <a th:href="@{/order/website}" class="btn btn-primary"><i class="fas fa-plus"></i> Add New Websites</a>
            </div>
          </div>
        </div>
        <div class="card-body border-bottom">
          <div class="row g-3">
            <div class="col-xxl-4 col-lg-6">
              <input type="search" class="form-control" id="searchTableList" placeholder="Search for ..."/>
            </div>
            <div class="col-xxl-2 col-lg-6">
              <select class="form-select" id="idStatus" aria-label="Default select example">
                <option value="all">Status</option>
                <option value="Active">Active</option>
                <option value="New">New</option>
                <option value="Close">Close</option>
              </select>
            </div>
            <div class="col-xxl-2 col-lg-4">
              <select class="form-select" id="idType" aria-label="Default select example">
                <option value="all">Select Type</option>
                <option value="Full Time">Full Time</option>
                <option value="Part Time">Part Time</option>
              </select>
            </div>
            <div class="col-xxl-2 col-lg-4">
              <div id="datepicker1">
                <input type="text" class="form-control" placeholder="Select date" data-date-format="dd M, yyyy"
                       data-date-container="#datepicker1" data-date-autoclose="true" data-provide="datepicker"/>
              </div>
            </div>
            <div class="col-xxl-2 col-lg-4">
              <button type="button" class="btn btn-soft-secondary w-100" onclick="filterData();"><i
                class="mdi mdi-filter-outline align-middle"></i> Filter
              </button>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <div id="job-list_wrapper" class="dataTables_wrapper dt-bootstrap4 no-footer">
              <div class="row">
                <div class="col-sm-12 col-md-6"></div>
                <div class="col-sm-12 col-md-6">
                  <div id="job-list_filter" class="dataTables_filter" style="display: none;"><label>Search:<input
                    type="search" class="form-control form-control-sm" placeholder="" aria-controls="job-list"></label>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-sm-12">
                  <table
                    class="table align-middle dt-responsive nowrap w-100 table-check dataTable no-footer dtr-inline"
                    id="job-list" aria-describedby="job-list_info" style="width: 1572px;">
                    <thead>
                    <tr>
                      <th scope="col" class="sorting sorting_desc" tabindex="0" aria-controls="job-list" rowspan="1"
                          colspan="1" style="width: 30px;" aria-sort="descending"
                          aria-label="No: activate to sort column ascending">No
                      </th>
                      <th scope="col" class="sorting" tabindex="0" aria-controls="job-list" rowspan="1" colspan="1"
                          style="width: 177px;" aria-label="Job Title: activate to sort column ascending">Domain
                      </th>
                      <th scope="col" class="sorting" tabindex="0" aria-controls="job-list" rowspan="1" colspan="1"
                          style="width: 175px;" aria-label="Company Name: activate to sort column ascending">
                        Dedicated IP
                      </th>
                      <th scope="col" class="sorting" tabindex="0" aria-controls="job-list" rowspan="1" colspan="1"
                          style="width: 150px;" aria-label="Location: activate to sort column ascending">
                        Payment method
                      </th>
                      <th scope="col" class="sorting" tabindex="0" aria-controls="job-list" rowspan="1" colspan="1"
                          style="width: 150px;" aria-label="Position: activate to sort column ascending">
                        Billing Cycle
                      </th>
                      <th scope="col" class="sorting" tabindex="0" aria-controls="job-list" rowspan="1" colspan="1"
                          style="width: 100px;" aria-label="Posted Date: activate to sort column ascending">
                        Register Date
                      </th>
                      <th scope="col" class="sorting" tabindex="0" aria-controls="job-list" rowspan="1" colspan="1"
                          style="width: 84px;" aria-label="Last Date: activate to sort column ascending">
                        Next Due Date
                      </th>
                      <th scope="col" class="sorting" tabindex="0" aria-controls="job-list" rowspan="1" colspan="1"
                          style="width: 60px;" aria-label="Status: activate to sort column ascending">
                        Status
                      </th>
                      <th scope="col" class="sorting_disabled" rowspan="1" colspan="1" style="width: 121px;"
                          aria-label="Action">Action
                      </th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr class="odd" th:each="vps,iter: ${result}" th:id="${'tr' + vps.id}">
                      <td class="sorting_1 dtr-control" th:text="${iter.index + 1}" />
                      <td th:text="${vps.domain}" />
                      <td th:text="${vps.dedicatedip}" />
                      <td th:text="${vps.paymentmethod}" />
                      <td th:text="${vps.billingcycle}" />
                      <td th:text="${vps.regdate}" />
                      <td th:text="${vps.domain}" />
                      <td>
                        <span class="badge bg-info" th:if="${vps.domainStatus == 'Active'}" th:text="${vps.domainStatus}"></span>
                        <span class="badge bg-secondary" th:if="${vps.domainStatus == 'Pending'}" th:text="${vps.domainStatus}"></span>
                        <span class="badge bg-warning" th:if="${vps.domainStatus == 'Suspended'}" th:text="${vps.domainStatus}"></span>
                        <span class="badge bg-danger" th:if="${vps.domainStatus == 'Terminated'}" th:text="${vps.domainStatus}"></span>
                        <span class="badge bg-info" th:if="${vps.domainStatus == 'Cancelled'}" th:text="${vps.domainStatus}"></span>
                        <span class="badge bg-warning" th:if="${vps.domainStatus == 'Fraud'}" th:text="${vps.domainStatus}"></span>
                        <span class="badge bg-primary" th:if="${vps.domainStatus == 'Completed'}" th:text="${vps.domainStatus}"></span>
                      </td>
                      <td>
                        <ul class="list-unstyled hstack gap-1 mb-0">
                          <li>
                            <a th:href="${'/vm/view?id=' + vps.id}" class="btn btn-sm btn-soft-primary">
                              <i class="mdi mdi-eye-outline"></i>
                            </a>
                          </li>
                          <li>
                            <a th:id="${vps.id}" class="btn btn-sm btn-soft-danger btn-delete">
                              <i class="mdi mdi-delete-outline"></i>
                            </a>
                          </li>
                        </ul>
                      </td>
                    </tr>
                    </tbody>
                  </table>
                </div>
              </div>
              <div class="row">
                <div class="col-sm-12 col-md-5">
                  <div class="dataTables_info" id="job-list_info" role="status" aria-live="polite">Showing 1 to 10 of 11
                    entries
                  </div>
                </div>
                <div class="col-sm-12 col-md-7">
                  <div class="dataTables_paginate paging_simple_numbers pagination-rounded" id="job-list_paginate">
                    <ul class="pagination">
                      <li class="paginate_button page-item previous disabled" id="job-list_previous"><a
                        aria-controls="job-list" aria-disabled="true" role="link" data-dt-idx="previous" tabindex="-1"
                        class="page-link"><i class="mdi mdi-chevron-left"></i></a></li>
                      <li class="paginate_button page-item active"><a href="#" aria-controls="job-list" role="link"
                                                                      aria-current="page" data-dt-idx="0" tabindex="0"
                                                                      class="page-link">1</a></li>
                      <li class="paginate_button page-item "><a href="#" aria-controls="job-list" role="link"
                                                                data-dt-idx="1" tabindex="0" class="page-link">2</a>
                      </li>
                      <li class="paginate_button page-item next" id="job-list_next"><a href="#" aria-controls="job-list"
                                                                                       role="link" data-dt-idx="next"
                                                                                       tabindex="0" class="page-link"><i
                        class="mdi mdi-chevron-right"></i></a></li>
                    </ul>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="dynamicCss"></div>
<div id="dynamicJS">
  <script th:src="@{/js/vps-list.js}"></script>
  <script th:src="@{/js/vps-delete.js}"></script>
</div>
</body>
</html>
