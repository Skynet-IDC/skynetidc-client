server:
  port: 8080

spring:
  messages:
    basename: messages/messages
    encoding: UTF-8
  thymeleaf:
    mode: HTML
    encoding: UTF-8
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
logging:
  level:
    org:
      springframework: INFO
      web: DEBUG
      context:
        annotation: TRACE
